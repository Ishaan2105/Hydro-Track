<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1565c0">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroTrack | Interactive Entry</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="notification-container" style="position: fixed; top: 20px; right: 20px; z-index: 1000;"></div>
    <div id="mist-container">
        <div class="mist-blob"></div>
        <div class="mist-blob"></div>
        <div class="mist-blob"></div>
    </div>
    
    <div id="rain-container"></div>
    <div id="ripple-container"></div> 

    <div class="page-content">
        <div class="bottle-card" id="bottle">
            <div class="bottle-cap"></div>
            
            <div class="bottle-water" id="bottleWater">
                <div class="wave"></div>
            </div>

            <div class="form-container">
                <div class="logo">💧</div>
                <h1 id="form-title">Login</h1>

                <form id="loginForm">
                    <input type="text" id="loginUser" placeholder="Username" required oninput="updateBottle()">
                    <div class="password-box">
                        <input type="password" id="loginPass" placeholder="Password" required oninput="updateBottle()">
                        <span class="toggle-eye" onclick="togglePass('loginPass')">👁️</span>
                    </div>
                    <button type="submit" class="btn-main">Dive In</button>
                </form>

                <div class="switch">
                    <a href="#" onclick="showRecovery()">Forgot Password?</a>
                </div>

                <div id="recoveryForm" style="display: none;">
                    <p style="font-size: 14px; margin-bottom: 10px; color: #333;">Enter your registered email to receive a temporary password.</p>
                    <input type="email" id="recoveryEmail" placeholder="Registered Email">
                    <button type="button" class="btn-main" onclick="recoverPassword()">Send Temporary Pass</button>
                    <div class="switch">
                        <a href="#" onclick="hideRecovery()">Back to Login</a>
                    </div>
                </div>

                <form id="signupForm" style="display: none;">
                    <input type="email" id="regEmail" placeholder="Email" required oninput="updateBottle()">
                    <input type="text" id="regUser" placeholder="Username" required oninput="updateBottle()">
                    <div class="password-box">
                        <input type="password" id="regPass" placeholder="Password" required oninput="updateBottle()">
                        <span class="toggle-eye" onclick="togglePass('regPass')">👁️</span>
                    </div>
                    <div class="password-box">
                        <input type="password" id="regConfirm" placeholder="Confirm Password" required oninput="updateBottle()">
                        <span class="toggle-eye" onclick="togglePass('regConfirm')">👁️</span>
                    </div>
                    <button type="submit" class="btn-main">Create Account</button>
                </form>

                <div class="switch">
                    <p id="switch-text">New here? <a href="#" onclick="toggleForm()">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>


    <!-- EFFECTS -->
<div id="balatro-bg"></div>

<script type="module">
    import { Renderer, Program, Mesh, Triangle } from 'https://cdn.skypack.dev/ogl';

    const container = document.getElementById('balatro-bg');

    // CONFIGURATION (Matches your React props)
    const config = {
        spinRotation: -2.0,
        spinSpeed: 7.0,
        color1: '#1f07d5',
        color2: '#ffffff',
        color3: '#99dbe5',
        contrast: 3.5,
        lighting: 0.4,
        spinAmount: 0.25,
        pixelFilter: 980.0,
        spinEase: 1.0,
        isRotate: true,
        mouseInteraction: true
    };

    function hexToVec4(hex) {
    let hexStr = hex.replace('#', '');
    let r = 0,
        g = 0,
        b = 0,
        a = 1;
    if (hexStr.length === 6) {
        r = parseInt(hexStr.slice(0, 2), 16) / 255;
        g = parseInt(hexStr.slice(2, 4), 16 ) / 255;
        b = parseInt(hexStr.slice(4, 6), 16) / 255;
    } else if (hexStr.length === 8) {
        r = parseInt(hexStr.slice(0, 2), 16) / 255;
        g = parseInt(hexStr.slice(2, 4), 16) / 255;
        b = parseInt(hexStr.slice(4, 6), 16) / 255;
        a = parseInt(hexStr.slice(6, 8), 16) / 255;
    }
        return [r, g, b, 1.9];
    }

    const vertexShader = `
        attribute vec2 uv;
        attribute vec2 position;
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = vec4(position, 0, 1);
        }
    `;

    const fragmentShader = `
        precision highp float;
        #define PI 3.14159265359
        uniform float iTime;
        uniform vec3 iResolution;
        uniform float uSpinRotation;
        uniform float uSpinSpeed;
        uniform vec4 uColor1;
        uniform vec4 uColor2;
        uniform vec4 uColor3;
        uniform float uContrast;
        uniform float uLighting;
        uniform float uSpinAmount;
        uniform float uPixelFilter;
        uniform float uSpinEase;
        uniform bool uIsRotate;
        uniform vec2 uMouse;
        varying vec2 vUv;

        vec4 effect(vec2 screenSize, vec2 screen_coords) {
            float pixel_size = length(screenSize.xy) / uPixelFilter;
            vec2 uv = (floor(screen_coords.xy * (1.0 / pixel_size)) * pixel_size - 0.5 * screenSize.xy) / length(screenSize.xy);
            float uv_len = length(uv);
            float speed = (uSpinRotation * uSpinEase * 0.000001);
            if(uIsRotate) speed = iTime * speed;
            speed += 302.2;
            speed += (uMouse.x * 2.0 - 1.0) * 0.1;
            float new_pixel_angle = atan(uv.y, uv.x) + speed - uSpinEase * 20.0 * (uSpinAmount * uv_len + (1.0 - uSpinAmount));
            vec2 mid = (screenSize.xy / length(screenSize.xy)) / 2.0;
            uv = (vec2(uv_len * cos(new_pixel_angle) + mid.x, uv_len * sin(new_pixel_angle) + mid.y) - mid);
            uv *= 30.0;
            float baseSpeed = iTime * uSpinSpeed;
            vec2 uv2 = vec2(uv.x + uv.y);
            for(int i = 0; i < 5; i++) {
                uv2 += sin(max(uv.x, uv.y)) + uv;
                uv += 0.5 * vec2(cos(5.1123314 + 0.353 * uv2.y + (baseSpeed + (uMouse.x * 2.0 - 1.0) * 2.0) * 0.131121), sin(uv2.x - 0.113 * baseSpeed));
                uv -= cos(uv.x + uv.y) - sin(uv.x * 0.711 - uv.y);
            }
            float contrast_mod = (0.25 * uContrast + 0.5 * uSpinAmount + 1.2);
            float paint_res = min(2.0, max(0.0, length(uv) * 0.035 * contrast_mod));
            float c1p = max(0.0, 1.0 - contrast_mod * abs(1.0 - paint_res));
            float c2p = max(0.0, 1.0 - contrast_mod * abs(paint_res));
            float c3p = 1.0 - min(1.0, c1p + c2p);
            float light = (uLighting - 0.2) * max(c1p * 5.0 - 4.0, 0.0) + uLighting * max(c2p * 5.0 - 4.0, 0.0);
            return (0.3 / uContrast) * uColor1 + (1.0 - 0.3 / uContrast) * (uColor1 * c1p + uColor2 * c2p + vec4(c3p * uColor3.rgb, c3p * uColor1.a)) + light;
        }

        void main() {
            gl_FragColor = effect(iResolution.xy, vUv * iResolution.xy);
        }
    `;

    const renderer = new Renderer();
    const gl = renderer.gl;
    container.appendChild(gl.canvas);

    const geometry = new Triangle(gl);
    const program = new Program(gl, {
        vertex: vertexShader,
        fragment: fragmentShader,
        uniforms: {
            iTime: { value: 0 },
            iResolution: { value: [0, 0, 0] },
            uSpinRotation: { value: config.spinRotation },
            uSpinSpeed: { value: config.spinSpeed },
            uColor1: { value: hexToVec4(config.color1) },
            uColor2: { value: hexToVec4(config.color2) },
            uColor3: { value: hexToVec4(config.color3) },
            uContrast: { value: config.contrast },
            uLighting: { value: config.lighting },
            uSpinAmount: { value: config.spinAmount },
            uPixelFilter: { value: config.pixelFilter },
            uSpinEase: { value: config.spinEase },
            uIsRotate: { value: config.isRotate },
            uMouse: { value: [0.5, 0.5] }
        }
    });

    const mesh = new Mesh(gl, { geometry, program });

    function resize() {
        renderer.setSize(window.innerWidth, window.innerHeight);
        program.uniforms.iResolution.value = [gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height];
    }
    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('mousemove', (e) => {
        if (!config.mouseInteraction) return;
        program.uniforms.uMouse.value = [e.clientX / window.innerWidth, 1.0 - (e.clientY / window.innerHeight)];
    });

    function update(t) {
        requestAnimationFrame(update);
        program.uniforms.iTime.value = t * 0.001;
        renderer.render({ scene: mesh });
    }
    requestAnimationFrame(update);
</script>

    <script src="index.js"></script>
</body>
</html>
