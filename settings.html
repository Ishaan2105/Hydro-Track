<body class="theme-day">

        <div class="user-profile" onclick="toggleLogout()">
            <div class="user-avatar" id="user-initial">U</div>
            <div class="user-info">
                <span id="username-display">User</span>
                <!-- <small>Active</small> -->
            </div>
            <div id="logout-menu" class="logout-dropdown">
                <button onclick="logout()">Logout</button>
            </div>
        </div>

    <main class="content">
        <header>
            <h1>Settings</h1>
        </header>



        <section class="settings-card">
            <h3>🎯 Daily Goal</h3>
            <p>Target intake in Liters</p>
            <div class="goal-input-row">
                <input type="number" id="goal-val" step="0.1" placeholder="--">
                <button id="set-target-btn" onclick="saveGlobalGoal()">Set Target</button>
            </div>
        </section>

        <section class="settings-card">
            <h3>🔔 Notifications</h3>
            <p>Configure hydration reminders</p>
            
            <div class="notif-type-selector">
                <button id="btn-specific" onclick="setNotifMode('specific')">Specific Times</button>
                <!-- <button id="btn-interval" onclick="setNotifMode('interval')">Interval Based</button> -->
            </div>

            <div id="specific-options" class="notif-sub-panel">
                <div class="dummy-times"></div>

                <div class="manual-time">
                    <input type="time" id="manual-t">
                    <button onclick="addManualTime()">Add Time</button>
                </div>
            </div>

                        <input type="checkbox" id="interval-master-toggle" onchange="toggleIntervalFeature()">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div id="interval-input-area" style="opacity: 0.5; pointer-events: none; transition: 0.3s;">
                    <p style="font-weight: 600;">Repeat after 
                        <input type="number" id="interval-min" placeholder="60" style="width: 80px; text-align: center;" oninput="checkIntervalInput()"> 
                        minutes
                    </p>
                    <button id="interval-done-btn" onclick="saveInterval()" style="display:none; margin-top:10px; background:#1565c0; color: white; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-weight: bold;">
                        Save Interval
                    </button>
                </div>
            </div> -->

            <div class="post-meal-row">
                <span>Post-Meal Reminder (30 minutes)</span>
                <label class="switch">
                    <input type="checkbox" id="post-meal-toggle" onchange="togglePostMeal()">
                    <span class="slider"></span>
                </label>
            </div>
        </section>

        <section class="settings-card">
            <h3>📋 Your Reminders</h3>
            <div id="reminders-list" class="reminders-list">
                </div>
        </section>

                <section class="settings-card">
            <h3>🔒 Change Password</h3>
            <div class="pass-box">
                <input type="password" id="curr-pass" placeholder="Current Password">
                <span class="eye" onclick="togglePass('curr-pass')">👁️</span>
            </div>
            <div class="pass-box">
                <input type="password" id="new-pass" placeholder="New Password">
                <span class="eye" onclick="togglePass('new-pass')">👁️</span>
            </div>
            <div class="pass-box">
                <input type="password" id="conf-pass" placeholder="Confirm New Password">
                <span class="eye" onclick="togglePass('conf-pass')">👁️</span>
            </div>
            <div class="btn-group">
                <button class="btn-save" onclick="updatePassword()">Set New Password</button>
                <button class="btn-cancel" onclick="clearPassFields()">Cancel</button>
            </div>
        </section>

    </main>

    <!-- EFFECTS -->
    <div id="waves-bg"></div>
